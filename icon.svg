<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="stamp">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="#111111"/>

  <!-- 外側の円（印鑑の枠） -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#d4a0b0" stroke-width="14" filter="url(#stamp)"/>
  <!-- 内側の細い円 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#d4a0b0" stroke-width="4" filter="url(#stamp)"/>

  <!-- 漢字 -->
  <text x="256" y="230"
    text-anchor="middle"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="148"
    font-weight="bold"
    fill="#d4a0b0"
    filter="url(#stamp)">漢字</text>

  <!-- 召喚 -->
  <text x="256" y="375"
    text-anchor="middle"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="148"
    font-weight="bold"
    fill="#d4a0b0"
    filter="url(#stamp)">召喚</text>
</svg>
